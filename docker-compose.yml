version: '3.8'

services:
  # 🗄️ CƠ SỞ DỮ LIỆU CỐT LÕI
  postgres:
    image: postgres:15-alpine
    container_name: eduport-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: eduport_user
      POSTGRES_PASSWORD: eduport_password
      POSTGRES_DB: eduport_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eduport_network
    restart: unless-stopped

  # 🚀 CACHE TỐC ĐỘ CAO (ĐẾM SĨ SỐ GIỜ VÀNG)
  redis:
    image: redis:7-alpine
    container_name: eduport-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass "eduport_redis"
    volumes:
      - redis_data:/data
    networks:
      - eduport_network
    restart: unless-stopped

  # 📨 MESSAGE BROKER CHUYÊN NGHIỆP (KAFKA KHÔNG CẦN ZOOKEEPER)
  kafka:
    image: bitnami/kafka:3.6.1
    container_name: eduport-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - eduport_network
    restart: unless-stopped
    
  # CỔNG GO (DÙNG ĐỂ CHẠY QUEUE WORKER NẾU SAU NÀY ĐÓNG GÓI DOCKER IMAGE)
  # go-backend:
  #   build: ./backend-queue
  #   container_name: eduport-go-queue
  #   ports:
  #     - "3000:3000"
  #   depends_on:
  #     - redis
  #     - kafka
  #   networks:
  #     - eduport_network

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  eduport_network:
    driver: bridge
