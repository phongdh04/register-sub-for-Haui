version: '3.8'

services:
  # 🗄️ CƠ SỞ DỮ LIỆU CỐT LÕI
  postgres:
    image: postgres:15-alpine
    container_name: eduport-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: eduport_user
      POSTGRES_PASSWORD: eduport_password
      POSTGRES_DB: eduport_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - eduport_network
    restart: unless-stopped

  # 🚀 CACHE TỐC ĐỘ CAO (ĐẾM SĨ SỐ GIỜ VÀNG)
  redis:
    image: redis:7-alpine
    container_name: eduport-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass "eduport_redis"
    volumes:
      - redis_data:/data
    networks:
      - eduport_network
    restart: unless-stopped

  # 📨 MESSAGE BROKER CHUYÊN NGHIỆP (KAFKA KHÔNG CẦN ZOOKEEPER)
  kafka:
    image: bitnami/kafka:3.6.1
    container_name: eduport-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
    volumes:
      - kafka_data:/bitnami/kafka
    networks:
      - eduport_network
    restart: unless-stopped
    
  # 🚀 GO QUEUE SERVICE – Cổng Giờ Vàng (Task 12)
  go-queue:
    build: ./backend-queue
    container_name: eduport-go-queue
    ports:
      - "3000:3000"
    environment:
      SERVER_PORT: "3000"
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: "eduport_redis"
      REDIS_DB: "0"
      KAFKA_BROKER: "kafka:9092"
      KAFKA_TOPIC: "eduport.dang-ky-hoc-phan"
      DATABASE_DSN: "host=postgres user=eduport_user password=eduport_password dbname=eduport_db port=5432 sslmode=disable TimeZone=Asia/Ho_Chi_Minh"
    depends_on:
      - redis
      - kafka
      - postgres
    networks:
      - eduport_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  kafka_data:

networks:
  eduport_network:
    driver: bridge
