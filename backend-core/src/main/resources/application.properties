spring.application.name=backend-core

# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/eduport_db
spring.datasource.username=eduport_user
spring.datasource.password=eduport_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret Properties
jwt.secret=eduport_super_secret_key_1234567890_eduport_super_secret_key_1234567890
jwt.expiration=86400000

# ============================================================
# KAFKA CONSUMER – Nhận message đăng ký từ Go Queue Service
# ============================================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=eduport-java-consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Tối đa 10 message/poll tránh quá tải DB
spring.kafka.consumer.max-poll-records=10
# Topic config
eduport.kafka.topic.dang-ky=eduport.dang-ky-hoc-phan
eduport.kafka.topic.pre-registration=eduport.pre-registration-submitted

# ============================================================
# THANH TOÁN (Task 9) – VNPay sandbox / MoMo stub / MOCK
# ============================================================
eduport.payment.default-provider=MOCK
eduport.payment.vnpay.payment-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
eduport.payment.vnpay.tmn-code=
eduport.payment.vnpay.hash-secret=
eduport.payment.vnpay.return-url=http://localhost:5173/student/thanhtonqrcodeopenapi

# ============================================================
# REDIS – Kiểm tra slot + Distributed Lock
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=eduport_redis
spring.data.redis.database=0

# ============================================================
# MFA / 2FA (Task 22) – OTP sau đăng nhập ADMIN; TTL phút
# OTP demo: xem log WARN backend (MfaOtpDelivery) nếu chưa cấu hình SMTP
# ============================================================
eduport.mfa.otp-ttl-minutes=5

# ============================================================
# TKB Phase 1 (BACK-TKB-009) — đồng bộ FK phòng ⇄ chuỗi phòng trong JSON
# ============================================================
eduport.tkb.dual-write-phong.enabled=true

# ============================================================
# BACK-TKB-014 — Dự báo mở lớp §6 (mặc định admin có thể ghi đè khi POST /forecast)
# ============================================================
eduport.forecast.si-so-mac-dinh=40
eduport.forecast.he-so-du-phong=1.10
eduport.forecast.ty-le-sv-hoc-lai=0.60

# ============================================================
# BACK-TKB-019 — CP-SAT orchestrator & dry-run (/solver/dry-run)
# ============================================================
eduport.solver.cpsat.max-time-seconds=120
eduport.solver.cpsat.random-seed=1
eduport.solver.cpsat.num-search-workers=4
eduport.solver.cpsat.lecturer-pool-cap=500
eduport.solver.cpsat.max-tiet-per-day=12
# BACK-TKB-022 — CP-SAT mini assignment (/solver/mvp-run)
eduport.solver.cpsat.mvp-max-classes=20
eduport.solver.cpsat.mvp-max-tuples-per-class=150
# BACK-TKB-028 — multi-scope merge pass
eduport.solver.cpsat.mvp-multi-scope-chunk-size=4

# ============================================================
# BACK-PREREG — Public pre-registration queue ingress (Go)
# ============================================================
eduport.prereg.go-ingress.base-url=http://localhost:8081
eduport.prereg.go-ingress.submit-path=/api/v1/queue/pre-reg
eduport.prereg.go-ingress.timeout-ms=2000
eduport.prereg.quota.buffer-minutes=120
