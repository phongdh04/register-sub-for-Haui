spring.application.name=backend-core

# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/eduport_db
spring.datasource.username=eduport_user
spring.datasource.password=eduport_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret Properties (Sẽ dùng thư viện JJWT sau)
jwt.secret=eduport_super_secret_key_1234567890_eduport_super_secret_key_1234567890
jwt.expiration=86400000
