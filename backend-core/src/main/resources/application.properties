spring.application.name=backend-core

# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=jdbc:postgresql://localhost:5432/eduport_db
spring.datasource.username=eduport_user
spring.datasource.password=eduport_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT Secret Properties
jwt.secret=eduport_super_secret_key_1234567890_eduport_super_secret_key_1234567890
jwt.expiration=86400000

# ============================================================
# KAFKA CONSUMER – Nhận message đăng ký từ Go Queue Service
# ============================================================
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=eduport-java-consumer
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
# Tối đa 10 message/poll tránh quá tải DB
spring.kafka.consumer.max-poll-records=10
# Topic config
eduport.kafka.topic.dang-ky=eduport.dang-ky-hoc-phan

# ============================================================
# THANH TOÁN (Task 9) – VNPay sandbox / MoMo stub / MOCK
# ============================================================
eduport.payment.default-provider=MOCK
eduport.payment.vnpay.payment-url=https://sandbox.vnpayment.vn/paymentv2/vpcpay.html
eduport.payment.vnpay.tmn-code=
eduport.payment.vnpay.hash-secret=
eduport.payment.vnpay.return-url=http://localhost:5173/student/thanhtonqrcodeopenapi

# ============================================================
# REDIS – Kiểm tra slot + Distributed Lock
# ============================================================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=eduport_redis
spring.data.redis.database=0
